<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef } = React;
const M = { div: 'div', button: 'button', span: 'span' };

/* ============================================================
   REAL MODEL ARTIFACTS (produced by backend/model/train.py)
   ============================================================ */
const MODEL_METRICS = {
  "Logistic Regression": {accuracy:0.8015, precision:0.2169, recall:0.7517, f1_score:0.3367, roc_auc:0.8596},
  "Decision Tree": {accuracy:0.7849, precision:0.2021, recall:0.7498, f1_score:0.3184, roc_auc:0.8456},
  "Random Forest": {accuracy:0.8245, precision:0.2391, recall:0.7423, f1_score:0.3617, roc_auc:0.8624},
};
const BEST_MODEL = "Random Forest";
const FEATURE_IMPORTANCE = [
  {feature:"Revolving Credit Utilization", importance:0.266},
  {feature:"Total Past-Due Events", importance:0.263},
  {feature:"90+ Days Late Count", importance:0.102},
  {feature:"30-59 Days Past Due", importance:0.102},
  {feature:"Age", importance:0.052},
  {feature:"60-89 Days Past Due", importance:0.047},
  {feature:"Open Credit Lines", importance:0.039},
  {feature:"Real Estate Loans", importance:0.033},
  {feature:"Debt Ratio", importance:0.023},
  {feature:"Credit Lines / Age", importance:0.020},
];
const ROC_CURVE = [
  {fpr:0,tpr:0},{fpr:0.05,tpr:0.32},{fpr:0.1,tpr:0.48},{fpr:0.15,tpr:0.58},
  {fpr:0.2,tpr:0.66},{fpr:0.3,tpr:0.76},{fpr:0.4,tpr:0.82},{fpr:0.5,tpr:0.87},
  {fpr:0.6,tpr:0.90},{fpr:0.8,tpr:0.95},{fpr:1,tpr:1}
];
const API_BASE = (window.localStorage && window.localStorage.getItem('CREDIT_API_BASE')) || "http://localhost:5000";

/* ============================================================
   UTILITIES
   ============================================================ */
function cls(...a){ return a.filter(Boolean).join(' '); }

/* ============================================================
   LIGHTWEIGHT SVG CHARTS (no external chart library required)
   ============================================================ */
const CHART_COLORS = ["#4F8CFF","#9B6BFF","#27E0C7","#FFC107","#00E676","#FF4D6D"];

function SimpleBarChart({data, keys, height=260, colors=CHART_COLORS}){
  const max = Math.max(0.0001, ...data.flatMap(d=>keys.map(k=>d[k]||0)));
  const barGroupW = 100/data.length;
  return (
    <div style={{height}} className="w-full flex flex-col">
      <div className="flex-1 flex items-end gap-2 px-1">
        {data.map((d,i)=>(
          <div key={i} className="flex-1 flex flex-col items-center justify-end h-full">
            <div className="flex items-end gap-1 h-full w-full justify-center">
              {keys.map((k,ki)=>(
                <div key={k} className="rounded-t-md transition-all duration-700 ease-out" title={`${k}: ${(d[k]*100).toFixed(1)}%`}
                  style={{
                    width: `${Math.max(8, 60/keys.length)}%`,
                    height: `${Math.max(2,(d[k]||0)/max*100)}%`,
                    background: colors[ki%colors.length],
                  }}/>
              ))}
            </div>
            <span className="text-[10px] text-white/40 mt-2 text-center truncate w-full">{d.name}</span>
          </div>
        ))}
      </div>
      <div className="flex flex-wrap gap-3 justify-center mt-3">
        {keys.map((k,ki)=>(
          <span key={k} className="text-[11px] text-white/50 flex items-center gap-1.5">
            <span className="w-2.5 h-2.5 rounded-sm inline-block" style={{background:colors[ki%colors.length]}}></span>
            {k.replace('_',' ')}
          </span>
        ))}
      </div>
    </div>
  );
}

function HorizontalBarChart({data, labelKey="feature", valueKey="importance", height=320, color="#4F8CFF"}){
  const max = Math.max(0.0001, ...data.map(d=>d[valueKey]));
  return (
    <div style={{height, overflowY:'auto'}} className="flex flex-col gap-3 pr-2">
      {data.map((d,i)=>(
        <div key={i}>
          <div className="flex justify-between text-[11px] text-white/50 mb-1">
            <span className="truncate">{d[labelKey]}</span>
            <span className="mono">{(d[valueKey]*100).toFixed(1)}%</span>
          </div>
          <div className="h-2.5 rounded-full bg-white/8">
            <div className="h-full rounded-full transition-all duration-700" style={{width:`${(d[valueKey]/max)*100}%`, background:color}}></div>
          </div>
        </div>
      ))}
    </div>
  );
}

function SvgLineChart({data, xKey, yKey, height=280, color="#27E0C7", area=true}){
  const w = 600;
  const h = height;
  const pad = 30;
  const xs = data.map(d=>d[xKey]);
  const ys = data.map(d=>d[yKey]);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = 0, yMax = Math.max(...ys, 1);
  const px = (x)=> pad + ((x-xMin)/(xMax-xMin||1)) * (w-2*pad);
  const py = (y)=> h-pad - ((y-yMin)/(yMax-yMin||1)) * (h-2*pad);
  const points = data.map(d=>`${px(d[xKey])},${py(d[yKey])}`).join(' ');
  const areaPoints = `${pad},${h-pad} ${points} ${w-pad},${h-pad}`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full" style={{height}}>
      {[0,0.25,0.5,0.75,1].map((t,i)=>(
        <line key={i} x1={pad} x2={w-pad} y1={h-pad-t*(h-2*pad)} y2={h-pad-t*(h-2*pad)} stroke="rgba(255,255,255,0.06)"/>
      ))}
      {area && <polygon points={areaPoints} fill={color} opacity="0.12"/>}
      <polyline points={points} fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
      <line x1={pad} y1={h-pad} x2={w-pad} y2={pad} stroke="rgba(255,255,255,0.10)" strokeDasharray="4 4"/>
      <text x={pad} y={h-8} fontSize="11" fill="rgba(255,255,255,0.35)">{xMin}</text>
      <text x={w-pad-18} y={h-8} fontSize="11" fill="rgba(255,255,255,0.35)">{xMax}</text>
    </svg>
  );
}

function DonutChart({data, height=220}){
  const total = data.reduce((a,d)=>a+d.value,0) || 1;
  let cumulative = 0;
  const r = 70, cx=100, cy=100, sw=24;
  const circumference = 2*Math.PI*r;
  return (
    <div className="flex flex-col items-center">
      <svg viewBox="0 0 200 200" style={{height, width:height}}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={sw}/>
        {data.map((d,i)=>{
          const frac = d.value/total;
          const dash = frac*circumference;
          const offset = circumference - (cumulative*circumference);
          cumulative += frac;
          return (
            <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth={sw}
              strokeDasharray={`${dash} ${circumference-dash}`} strokeDashoffset={offset}
              transform={`rotate(-90 ${cx} ${cy})`} strokeLinecap="butt"
              style={{transition:"stroke-dasharray 0.8s ease"}}/>
          );
        })}
      </svg>
    </div>
  );
}

function AreaTrendChart({data, xKey, yKey, height=220, color="#4F8CFF"}){
  return <SvgLineChart data={data} xKey={xKey} yKey={yKey} height={height} color={color} area={true} />;
}

function useCountUp(target, duration=1200, dec=0){
  const [val,setVal]=useState(0);
  useEffect(()=>{
    let start=null, raf;
    const step=(t)=>{
      if(!start) start=t;
      const p=Math.min((t-start)/duration,1);
      const eased = 1-Math.pow(1-p,3);
      setVal(target*eased);
      if(p<1) raf=requestAnimationFrame(step);
    };
    raf=requestAnimationFrame(step);
    return ()=>cancelAnimationFrame(raf);
  },[target]);
  return dec>0 ? val.toFixed(dec) : Math.round(val);
}

function localHeuristicPredict(f){
  const debtRatio = (Number(f.debt||0)+Number(f.existingEMI||0)) / (Number(f.income||1)+1);
  const util = Number(f.creditUtilization||0)/100;
  const defaultHist = Number(f.defaultHistory||0);
  let risk = 0.08 + util*0.32 + Math.min(debtRatio,2)*0.18 + defaultHist*0.09;
  risk -= Math.min(Number(f.savings||0)/Number(f.loanAmount||1),0.3)*0.15;
  risk -= Math.min(Number(f.employmentYears||0)/20,1)*0.08;
  risk = Math.min(Math.max(risk,0.02),0.95);
  const creditworthy = 1-risk;
  const creditScore = Math.round(300+creditworthy*550);
  let riskCategory, rate;
  if(risk<0.15){riskCategory="Low Risk";rate=6.5;}
  else if(risk<0.35){riskCategory="Moderate Risk";rate=10.5;}
  else if(risk<0.6){riskCategory="High Risk";rate=16.0;}
  else {riskCategory="Very High Risk";rate=22.0;}
  const reasons=[];
  if(util>0.5) reasons.push("High credit utilization ratio");
  if(defaultHist>0) reasons.push("History of late or missed payments");
  if(debtRatio>0.5) reasons.push("High debt-to-income ratio");
  if(Number(f.savings||0) < Number(f.loanAmount||0)*0.1) reasons.push("Low savings relative to requested loan amount");
  if(reasons.length===0) reasons.push("Stable income and healthy repayment history");
  return {
    approved: creditworthy>=0.5,
    creditScore, scoreBand: creditScore>=750?"Excellent":creditScore>=650?"Good":creditScore>=550?"Fair":"Poor",
    approvalProbability: +(creditworthy*100).toFixed(2),
    defaultProbability: +(risk*100).toFixed(2),
    confidence: +(Math.max(creditworthy,risk)*100).toFixed(2),
    riskCategory, suggestedInterestRate: rate,
    topInfluencingFeatures: FEATURE_IMPORTANCE.slice(0,5).map(d=>d.feature),
    reasons,
    suggestions: ["Reduce credit utilization below 30%","Maintain consistent on-time payments","Build an emergency savings buffer","Avoid taking on multiple new loans simultaneously"],
    explanation: `Based on the applicant's financial profile, the model estimates a ${(risk*100).toFixed(1)}% probability of serious delinquency within 2 years. This places the applicant in the '${riskCategory}' category.`,
    _offline: true,
  };
}

async function callPredict(form){
  try{
    const res = await fetch(`${API_BASE}/predict`,{
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(form)
    });
    if(!res.ok) throw new Error('bad response');
    return await res.json();
  }catch(e){
    return localHeuristicPredict(form);
  }
}

/* ============================================================
   SHARED UI ATOMS
   ============================================================ */
function Pill({children, color="primary"}){
  const map={primary:"text-[#4F8CFF] bg-[#4F8CFF]/10 border-[#4F8CFF]/30",
    success:"text-[#00E676] bg-[#00E676]/10 border-[#00E676]/30",
    warning:"text-[#FFC107] bg-[#FFC107]/10 border-[#FFC107]/30",
    danger:"text-[#FF4D6D] bg-[#FF4D6D]/10 border-[#FF4D6D]/30"};
  return <span className={cls("px-3 py-1 rounded-full text-xs font-semibold border", map[color])}>{children}</span>;
}

function Card({children, className, hover=true, ...rest}){
  const C = M.div || 'div';
  return (
    <C
      className={cls("glass rounded-2xl shadow-[0_8px_30px_rgba(0,0,0,0.35)]", hover && "transition-transform duration-300 hover:-translate-y-1 hover:shadow-[0_16px_50px_rgba(79,140,255,0.15)]", className)}
      {...rest}
    >{children}</C>
  );
}

function StatCard({label, value, suffix="", icon, accent="primary", decimals=0}){
  const v = useCountUp(value, 1300, decimals);
  const colors={primary:"#4F8CFF",success:"#00E676",warning:"#FFC107",danger:"#FF4D6D",purple:"#9B6BFF"};
  return (
    <Card className="p-6 relative overflow-hidden">
      <div className="absolute -right-6 -top-6 w-24 h-24 rounded-full blur-2xl opacity-30" style={{background:colors[accent]}}></div>
      <div className="flex items-start justify-between">
        <div>
          <p className="text-sm text-white/50 mb-1">{label}</p>
          <p className="text-3xl font-extrabold mono">{v}{suffix}</p>
        </div>
        <div className="w-11 h-11 rounded-xl flex items-center justify-center text-xl" style={{background:colors[accent]+"22", color:colors[accent]}}>{icon}</div>
      </div>
    </Card>
  );
}

function ScoreGauge({score=650}){
  const pct = Math.min(Math.max((score-300)/(850-300),0),1);
  const angle = pct*270 - 135;
  const color = score>=750?"#00E676":score>=650?"#4F8CFF":score>=550?"#FFC107":"#FF4D6D";
  const animatedScore = useCountUp(score, 1400);
  return (
    <div className="relative w-64 h-64 mx-auto flex items-center justify-center">
      <svg viewBox="0 0 200 200" className="w-full h-full -rotate-[135deg]">
        <circle cx="100" cy="100" r="85" stroke="rgba(255,255,255,0.08)" strokeWidth="14" fill="none" strokeDasharray="400.5" strokeDashoffset="100" strokeLinecap="round"/>
        <circle cx="100" cy="100" r="85" stroke={color} strokeWidth="14" fill="none"
          strokeDasharray="400.5" strokeDashoffset={400.5 - (pct*0.75)*400.5} strokeLinecap="round"
          style={{transition:"stroke-dashoffset 1.4s cubic-bezier(.4,2,.3,1), stroke 0.6s"}}/>
      </svg>
      <div className="absolute flex flex-col items-center">
        <span className="text-5xl font-extrabold mono" style={{color}}>{animatedScore}</span>
        <span className="text-white/50 text-sm mt-1">Credit Score</span>
      </div>
    </div>
  );
}

function RiskMeter({prob=50}){
  const color = prob<25?"#00E676":prob<55?"#FFC107":"#FF4D6D";
  const w = useCountUp(prob,1200);
  return (
    <div>
      <div className="flex justify-between text-sm text-white/60 mb-2">
        <span>Default Risk</span><span className="mono font-semibold" style={{color}}>{w}%</span>
      </div>
      <div className="h-3 rounded-full bg-white/10 overflow-hidden">
        <div className="h-full rounded-full" style={{width:`${prob}%`, background:`linear-gradient(90deg,#00E676,#FFC107,#FF4D6D)`, transition:"width 1.2s cubic-bezier(.4,2,.3,1)"}}></div>
      </div>
    </div>
  );
}

function Toast({toasts}){
  return (
    <div className="fixed top-6 right-6 z-50 flex flex-col gap-3">
      {toasts.map(t=>(
        <div key={t.id} className={cls("glass rounded-xl px-4 py-3 text-sm shadow-lg border-l-4 animate-[fadeIn_0.3s]",
          t.type==='success'?"border-l-[#00E676]":t.type==='error'?"border-l-[#FF4D6D]":"border-l-[#4F8CFF]")}>
          {t.message}
        </div>
      ))}

  );
}

            <p className="text-white/55 text-sm leading-relaxed">{f.desc}</p>
          </Card>
        ))}

      <section className="mb-24">
        <h2 className="text-2xl font-bold mb-6 text-center">Model Performance Preview</h2>
        <Card className="p-8">
          <SimpleBarChart
            data={Object.entries(MODEL_METRICS).map(([name,m])=>({name, ROC_AUC:m.roc_auc, Accuracy:m.accuracy, F1:m.f1_score}))}

            height={280}
          />
        </Card>
      </section>

      <footer className="text-center text-white/30 text-sm pt-10 border-t border-white/5">
        <p>Raja Credit System · AI Creditworthiness Prediction System · Built with React, Flask & Scikit-learn</p>
        <p className="mt-1">Trained on the "Give Me Some Credit" dataset · For academic & demonstration purposes</p>
      </footer>
    </div>
  );
}

/* ============================================================
   PREDICTION FORM
   ============================================================ */
const FIELD_DEFS = [
  {key:'age', label:'Age', type:'number', def:35, min:18, max:90},
  {key:'gender', label:'Gender', type:'select', options:['Male','Female','Other'], def:'Male'},
  {key:'income', label:'Monthly Income ($)', type:'number', def:5000, min:0},
  {key:'monthlyExpenses', label:'Monthly Expenses ($)', type:'number', def:1800, min:0},
  {key:'employmentYears', label:'Employment (years)', type:'number', def:4, min:0, max:50},
  {key:'employmentType', label:'Employment Type', type:'select', options:['Salaried','Self-Employed','Business Owner','Unemployed'], def:'Salaried'},
  {key:'loanAmount', label:'Loan Amount ($)', type:'number', def:15000, min:0},
  {key:'loanPurpose', label:'Loan Purpose', type:'select', options:['Home','Vehicle','Education','Business','Personal','Medical'], def:'Personal'},
  {key:'debt', label:'Existing Debt ($)', type:'number', def:6000, min:0},
  {key:'numberOfLoans', label:'Number of Loans', type:'number', def:2, min:0, max:20},
  {key:'savings', label:'Savings ($)', type:'number', def:4000, min:0},
  {key:'creditUtilization', label:'Credit Utilization (%)', type:'range', def:35, min:0, max:100},
  {key:'existingEMI', label:'Existing EMI ($)', type:'number', def:300, min:0},
  {key:'defaultHistory', label:'Past Defaults / Late Payments', type:'number', def:0, min:0, max:10},
];

function FieldInput({def, value, onChange}){
  if(def.type==='select'){
    return (
      <select value={value} onChange={e=>onChange(def.key,e.target.value)}
        className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#4F8CFF] transition-colors">
        {def.options.map(o=><option key={o} value={o} className="bg-[#0c1224]">{o}</option>)}
      </select>
    );
  }
  if(def.type==='range'){
    return (
      <div>
        <input type="range" min={def.min} max={def.max} value={value} onChange={e=>onChange(def.key,e.target.value)} className="w-full"/>
        <div className="text-right text-xs text-[#4F8CFF] mono mt-1">{value}%</div>
      </div>
    );
  }
  return (
    <input type="number" min={def.min} max={def.max} value={value} onChange={e=>onChange(def.key,e.target.value)}
      className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#4F8CFF] transition-colors mono"/>
  );
}

function Predict({onResult, pushToast}){
  const [form,setForm]=useState(()=>Object.fromEntries(FIELD_DEFS.map(f=>[f.key,f.def])));
  const [loading,setLoading]=useState(false);

  const update=(k,v)=>setForm(prev=>({...prev,[k]:v}));

  const submit=async(e)=>{
    e.preventDefault();
    setLoading(true);
    const result = await callPredict(form);
    setLoading(false);
    onResult({...result, input: form});
    pushToast(result.approved ? "Prediction complete — Approved" : "Prediction complete — Review required", result.approved?"success":"error");
  };

  return (
    <div className="px-8 py-10 max-w-5xl mx-auto">
      <h1 className="text-3xl font-extrabold mb-1">New Prediction</h1>
      <p className="text-white/50 mb-8">Enter applicant details to generate a real-time creditworthiness assessment.</p>
      <Card className="p-8">
        <form onSubmit={submit} className="grid md:grid-cols-2 gap-6">
          {FIELD_DEFS.map(def=>(
            <div key={def.key}>
              <label className="text-xs text-white/50 mb-2 block font-medium">{def.label}</label>
              <FieldInput def={def} value={form[def.key]} onChange={update}/>
            </div>
          ))}
          <div className="md:col-span-2 pt-4">
            <button type="submit" disabled={loading}
              className="grad-btn w-full py-4 rounded-xl font-bold text-base shadow-lg shadow-blue-500/20 hover:scale-[1.01] active:scale-[0.99] transition-transform disabled:opacity-60 flex items-center justify-center gap-2">
              {loading ? <><span className="w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></span>Analyzing Profile…</> : "Generate Prediction →"}
            </button>
          </div>
        </form>
      </Card>
    </div>
  );
}

/* ============================================================
   RESULT PAGE

  const riskColor = result.riskCategory?.includes('Low')?'success':result.riskCategory?.includes('Moderate')?'primary':result.riskCategory?.includes('Very')?'danger':'warning';
  return (
    <div className="px-8 py-10 max-w-5xl mx-auto">
      <div className="flex items-center justify-between mb-8">
        <div>
          <h1 className="text-3xl font-extrabold">Prediction Result</h1>
          <p className="text-white/50 mt-1">{result._offline ? "Computed locally (backend offline — heuristic mode)" : "Computed by trained model via live API"}</p>
        </div>
        <Pill color={result.approved?"success":"danger"}>{result.approved?"✓ Approved":"✕ Rejected"}</Pill>
      </div>

            <div>
              <p className="text-white/40 text-xs">Approval Probability</p>
              <p className="text-2xl font-extrabold mono text-[#00E676]">{result.approvalProbability}%</p>
            </div>
            <div>
              <p className="text-white/40 text-xs">Confidence</p>
              <p className="text-2xl font-extrabold mono">{result.confidence}%</p>
            </div>
            <div>
              <p className="text-white/40 text-xs">Suggested Rate</p>
              <p className="text-2xl font-extrabold mono text-[#FFC107]">{result.suggestedInterestRate}%</p>

          </div>
          <div>
            <Pill color={riskColor}>{result.riskCategory}</Pill>

      <div className="grid lg:grid-cols-2 gap-6 mb-6">
        <Card className="p-6">
          <h3 className="font-bold mb-3">AI Explanation</h3>
          <p className="text-white/60 text-sm leading-relaxed">{result.explanation}</p>
          <div className="mt-4">
            <p className="text-xs text-white/40 mb-2">Top Influencing Features</p>
            <div className="flex flex-wrap gap-2">
              {result.topInfluencingFeatures?.map((f,i)=><Pill key={i} color="primary">{f}</Pill>)}

        <Card className="p-6">
          <h3 className="font-bold mb-3">Key Reasons</h3>

        <h3 className="font-bold mb-3">Suggestions to Improve Creditworthiness</h3>
        <div className="grid md:grid-cols-2 gap-3">
          {result.suggestions?.map((s,i)=>(
            <div key={i} className="flex items-start gap-3 bg-white/5 rounded-xl p-4">

      <div className="flex gap-3 mt-6">
        <button onClick={()=>setPage('predict')} className="glass px-6 py-3 rounded-xl font-semibold hover:bg-white/10">New Prediction</button>
        <button onClick={()=>window.print()} className="grad-btn px-6 py-3 rounded-xl font-semibold">Export as PDF</button>
      </div>
    </div>
  );

/* ============================================================
   ANALYTICS PAGE
   ============================================================ */
function Analytics(){

  return (
    <div className="px-8 py-10 max-w-7xl mx-auto">

/* ============================================================
   HISTORY PAGE
   ============================================================ */
function History({history}){
  const [search,setSearch]=useState("");
  const [sortKey,setSortKey]=useState("timestamp");
  const [page,setPage]=useState(1);
  const perPage=6;

  const filtered = history.filter(h=>h.riskCategory?.toLowerCase().includes(search.toLowerCase()));
  const sorted = [...filtered].sort((a,b)=> (b[sortKey]||0) > (a[sortKey]||0) ? 1 : -1);
  const totalPages = Math.max(1,Math.ceil(sorted.length/perPage));
  const pageItems = sorted.slice((page-1)*perPage, page*perPage);

  return (
    <div className="px-8 py-10 max-w-6xl mx-auto">
      <h1 className="text-3xl font-extrabold mb-1">Prediction History</h1>
      <p className="text-white/50 mb-8">{history.length} predictions made this session</p>

      <Card className="p-6">
        <div className="flex flex-col md:flex-row gap-3 mb-5">
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by risk category…"
            className="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-[#4F8CFF]"/>
          <select value={sortKey} onChange={e=>setSortKey(e.target.value)} className="bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm">
            <option value="timestamp" className="bg-[#0c1224]">Sort: Newest</option>
            <option value="creditScore" className="bg-[#0c1224]">Sort: Credit Score</option>
          </select>
          <button onClick={()=>{
            const csv = "id,creditScore,riskCategory,approved\n"+history.map(h=>`${h.id||''},${h.creditScore},${h.riskCategory},${h.approved}`).join("\n");
            const blob = new Blob([csv],{type:'text/csv'});
            const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='prediction_history.csv'; a.click();
          }} className="glass px-4 py-2.5 rounded-xl text-sm font-semibold hover:bg-white/10">Download CSV</button>
        </div>

        {history.length===0 ? (
          <div className="text-center py-16 text-white/40">No predictions yet. Run one from the New Prediction page.</div>
        ) : (
          <>
          <table className="w-full text-sm">
            <thead className="text-white/40 text-left border-b border-white/10">
              <tr><th className="pb-2">ID</th><th className="pb-2">Score</th><th className="pb-2">Risk</th><th className="pb-2">Result</th><th className="pb-2">Time</th></tr>
            </thead>
            <tbody>
              {pageItems.map((r,i)=>(
                <tr key={i} className="border-b border-white/5 last:border-0">
                  <td className="py-3 text-white/50 mono">#{r.id}</td>
                  <td className="py-3 font-semibold mono">{r.creditScore}</td>
                  <td className="py-3 text-white/60">{r.riskCategory}</td>
                  <td className="py-3"><Pill color={r.approved?"success":"danger"}>{r.approved?"Approved":"Rejected"}</Pill></td>
                  <td className="py-3 text-white/40 text-xs mono">{new Date(r.timestamp).toLocaleTimeString()}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div className="flex justify-between items-center mt-4 text-sm text-white/50">
            <span>Page {page} of {totalPages}</span>
            <div className="flex gap-2">
              <button onClick={()=>setPage(p=>Math.max(1,p-1))} className="glass px-3 py-1.5 rounded-lg">‹ Prev</button>
              <button onClick={()=>setPage(p=>Math.min(totalPages,p+1))} className="glass px-3 py-1.5 rounded-lg">Next ›</button>
            </div>
          </div>
          </>
        )}
      </Card>
    </div>
  );
}

/* ============================================================
   ROOT APP
   ============================================================ */
function App(){
  const [page,setPage]=useState('landing');
  const [collapsed,setCollapsed]=useState(false);
  const [result,setResult]=useState(null);
  const [history,setHistory]=useState([]);
  const [toasts,setToasts]=useState([]);

  const pushToast=(message,type='info')=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,message,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);
  };

  const onResult=(res)=>{
    const entry = {...res, id: history.length+1, timestamp: res.timestamp || new Date().toISOString()};
    setResult(entry);
    setHistory(h=>[...h,entry]);
    setPage('result');
  };

  const showSidebar = page!=='landing';

  return (
    <div className="flex min-h-screen">
      <Toast toasts={toasts}/>
      {showSidebar && <Sidebar page={page} setPage={setPage} collapsed={collapsed} setCollapsed={setCollapsed}/>}
      <div className="flex-1 min-w-0">
        {page==='landing' && <Landing setPage={setPage}/>}
        {page==='dashboard' && <Dashboard history={history}/>}
        {page==='predict' && <Predict onResult={onResult} pushToast={pushToast}/>}
        {page==='result' && <ResultView result={result} setPage={setPage}/>}
        {page==='analytics' && <Analytics/>}
        {page==='history' && <History history={history}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

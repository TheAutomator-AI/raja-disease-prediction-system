<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raja Health Prediction System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); color: white; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API_URL = "https://MonarchOps.pythonanywhere.com";

        // Define Schemas to auto-generate forms
        const SCHEMAS = {
            heart: [
                { id: "age", label: "Age", type: "number" },
                { id: "sex", label: "Sex (1=M, 0=F)", type: "number" },
                { id: "cp", label: "Chest Pain Type (0-3)", type: "number" },
                { id: "trestbps", label: "Resting Blood Pressure", type: "number" },
                { id: "chol", label: "Cholesterol (mg/dl)", type: "number" },
                { id: "fbs", label: "Fasting Blood Sugar > 120 (1/0)", type: "number" },
                { id: "restecg", label: "Resting ECG (0-2)", type: "number" },
                { id: "thalach", label: "Max Heart Rate", type: "number" },
                { id: "exang", label: "Exercise Induced Angina (1/0)", type: "number" },
                { id: "oldpeak", label: "ST Depression", type: "number", step: "0.1" },
                { id: "slope", label: "Slope of Peak Exercise ST (0-2)", type: "number" },
                { id: "ca", label: "Number of Major Vessels (0-4)", type: "number" },
                { id: "thal", label: "Thal (0-3)", type: "number" }
            ],
            diabetes: [
                { id: "Pregnancies", label: "Pregnancies", type: "number" },
                { id: "Glucose", label: "Glucose Level", type: "number" },
                { id: "BloodPressure", label: "Blood Pressure", type: "number" },
                { id: "SkinThickness", label: "Skin Thickness", type: "number" },
                { id: "Insulin", label: "Insulin", type: "number" },
                { id: "BMI", label: "BMI", type: "number", step: "0.1" },
                { id: "DiabetesPedigreeFunction", label: "Pedigree Function", type: "number", step: "0.001" },
                { id: "Age", label: "Age", type: "number" }
            ],
            breast: [
                { id: "radius_mean", label: "Radius Mean", type: "number", step: "0.01" },
                { id: "texture_mean", label: "Texture Mean", type: "number", step: "0.01" },
                { id: "perimeter_mean", label: "Perimeter Mean", type: "number", step: "0.01" },
                { id: "area_mean", label: "Area Mean", type: "number", step: "0.01" },
                { id: "smoothness_mean", label: "Smoothness Mean", type: "number", step: "0.0001" }
                // Truncated for UI brevity, backend expects all features from CSV. 
                // In production, map all features present in metrics.json.
            ]
        };

        function App() {
            const [view, setView] = useState('landing');
            const [metrics, setMetrics] = useState(null);

            useEffect(() => {
                fetch(`${API_URL}/metrics`)
                    .then(res => res.json())
                    .then(data => setMetrics(data))
                    .catch(err => console.error("Metrics load error", err));
            }, []);

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
                        <div className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500 cursor-pointer" onClick={() => setView('landing')}>
                            Raja Health AI
                        </div>
                        <div className="flex gap-4">
                            {['Prediction', 'History', 'Analytics'].map(v => (
                                <button key={v} onClick={() => setView(v.toLowerCase())} 
                                    className={`px-4 py-2 rounded-lg transition-all ${view === v.toLowerCase() ? 'bg-white/20' : 'hover:bg-white/10'}`}>
                                    {v}
                                </button>
                            ))}
                        </div>
                    </nav>
                    
                    <main className="flex-grow p-6 w-full max-w-6xl mx-auto">
                        {view === 'landing' && <Landing setView={setView} />}
                        {view === 'prediction' && <Prediction metrics={metrics} />}
                        {view === 'history' && <History />}
                        {view === 'analytics' && <Analytics metrics={metrics} />}
                    </main>

                    <footer className="text-center py-6 text-gray-400 text-sm glass mt-auto">
                        Built with 💻 by <a href="https://github.com/TheAutomator-AI" className="text-purple-400 hover:underline" target="_blank">Raja</a> | 
                        <a href="https://linkedin.com/in/monarchregent" className="ml-1 text-purple-400 hover:underline" target="_blank">LinkedIn</a>
                    </footer>
                </div>
            );
        }

        function Landing({ setView }) {
            return (
                <div className="flex flex-col items-center justify-center text-center mt-20 space-y-8 animate-fade-in">
                    <h1 className="text-6xl font-extrabold tracking-tight">Predict the Future of <br/><span className="text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-blue-500">Your Health.</span></h1>
                    <p className="text-xl text-gray-300 max-w-2xl">Enterprise-grade machine learning models to predict Heart Disease, Diabetes, and Breast Cancer with high accuracy and confidence.</p>
                    <button onClick={() => setView('prediction')} className="px-8 py-4 bg-white text-black font-semibold rounded-full hover:scale-105 transition-transform shadow-[0_0_20px_rgba(255,255,255,0.3)]">
                        Start Prediction
                    </button>
                </div>
            );
        }

        function Prediction({ metrics }) {
            const [disease, setDisease] = useState('heart');
            const [formData, setFormData] = useState({});
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const resultRef = useRef();

            // Fetch actual features from metrics if available, else fallback to SCHEMAS
            const currentSchema = metrics && metrics[disease] && metrics[disease].features 
                ? metrics[disease].features.map(f => ({ id: f, label: f.replace(/_/g, ' '), type: "number", step: "any" }))
                : SCHEMAS[disease];

            const handleChange = (e) => setFormData({ ...formData, [e.target.id]: e.target.value });

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const res = await fetch(`${API_URL}/predict/${disease}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                    const data = await res.json();
                    if(data.error) throw new Error(data.error);
                    
                    setResult(data);
                    
                    // Save to history
                    const history = JSON.parse(localStorage.getItem('raja_health_history') || '[]');
                    history.unshift({ ...data, inputs: formData, date: new Date().toLocaleString() });
                    localStorage.setItem('raja_health_history', JSON.stringify(history));

                } catch (err) {
                    alert("Error: " + err.message);
                }
                setLoading(false);
            };

            const downloadPDF = () => {
                const element = resultRef.current;
                const opt = {
                    margin: 1,
                    filename: `${disease}_report_${new Date().getTime()}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true },
                    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
                };
                html2pdf().set(opt).from(element).save();
            };

            return (
                <div className="space-y-8 animate-fade-in">
                    <div className="flex justify-center space-x-4 mb-8">
                        {[{id:'heart', icon:'❤️', label:'Heart Disease'}, {id:'diabetes', icon:'🩸', label:'Diabetes'}, {id:'breast', icon:'🎗', label:'Breast Cancer'}].map(d => (
                            <button key={d.id} onClick={() => { setDisease(d.id); setResult(null); setFormData({}); }}
                                className={`px-6 py-3 rounded-xl font-medium transition-all ${disease === d.id ? 'bg-gradient-to-r from-blue-500 to-purple-600 shadow-lg' : 'glass hover:bg-white/10'}`}>
                                {d.icon} {d.label}
                            </button>
                        ))}
                    </div>

                    <div className="grid md:grid-cols-2 gap-8">
                        <div className="glass p-8 rounded-2xl">
                            <h2 className="text-2xl font-bold mb-6 capitalize">{disease} Parameters</h2>
                            <form onSubmit={handleSubmit} className="grid grid-cols-2 gap-4">
                                {currentSchema.map(field => (
                                    <div key={field.id} className="flex flex-col">
                                        <label className="text-xs text-gray-400 mb-1 uppercase tracking-wider">{field.label}</label>
                                        <input type={field.type} id={field.id} step={field.step || "1"} required
                                            onChange={handleChange} value={formData[field.id] || ''}
                                            className="bg-black/20 border border-gray-600 rounded-lg p-2 text-white focus:outline-none focus:border-blue-500 transition-colors" />
                                    </div>
                                ))}
                                <button type="submit" disabled={loading} className="col-span-2 mt-4 bg-white text-black py-3 rounded-xl font-bold hover:bg-gray-200 transition-colors">
                                    {loading ? 'Analyzing...' : 'Predict Risk'}
                                </button>
                            </form>
                        </div>

                        {result && (
                            <div className="glass p-8 rounded-2xl flex flex-col items-center justify-center text-center space-y-6" ref={resultRef}>
                                <h2 className="text-3xl font-bold">Prediction Result</h2>
                                <div className={`text-5xl font-black ${result.prediction === 1 ? 'text-red-500' : 'text-green-500'}`}>
                                    {result.prediction === 1 ? 'POSITIVE' : 'NEGATIVE'}
                                </div>
                                <div className="w-full bg-gray-700 h-4 rounded-full overflow-hidden mt-4">
                                    <div className={`h-full ${result.probability > 0.5 ? 'bg-red-500' : 'bg-green-500'}`} style={{ width: `${result.probability * 100}%` }}></div>
                                </div>
                                <div className="flex justify-between w-full text-sm text-gray-300">
                                    <span>Probability: {(result.probability * 100).toFixed(1)}%</span>
                                    <span>Confidence: {result.confidence}%</span>
                                </div>
                                <div className="p-4 bg-white/5 border border-white/10 rounded-lg text-left">
                                    <h4 className="font-bold text-yellow-400 mb-2">Recommendation</h4>
                                    <p className="text-sm">{result.recommendation}</p>
                                </div>
                                <button onClick={downloadPDF} className="px-6 py-2 border border-white/20 rounded-lg hover:bg-white/10 transition-colors flex items-center gap-2">
                                    📄 Download PDF Report
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function History() {
            const [history, setHistory] = useState([]);
            useEffect(() => {
                setHistory(JSON.parse(localStorage.getItem('raja_health_history') || '[]'));
            }, []);

            return (
                <div className="glass p-8 rounded-2xl animate-fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold">Prediction History</h2>
                        <button onClick={() => { localStorage.removeItem('raja_health_history'); setHistory([]); }} className="text-red-400 hover:text-red-300 text-sm">Clear History</button>
                    </div>
                    {history.length === 0 ? <p className="text-gray-400 text-center py-10">No history found.</p> : (
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="border-b border-white/10 text-gray-400 text-sm">
                                        <th className="p-3">Date</th>
                                        <th className="p-3">Disease</th>
                                        <th className="p-3">Prediction</th>
                                        <th className="p-3">Confidence</th>
                                        <th className="p-3">Risk</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {history.map((h, i) => (
                                        <tr key={i} className="border-b border-white/5 hover:bg-white/5 transition-colors">
                                            <td className="p-3 text-sm">{h.date}</td>
                                            <td className="p-3 capitalize">{h.disease}</td>
                                            <td className={`p-3 font-bold ${h.prediction === 1 ? 'text-red-400' : 'text-green-400'}`}>
                                                {h.prediction === 1 ? 'Positive' : 'Negative'}
                                            </td>
                                            <td className="p-3">{h.confidence}%</td>
                                            <td className="p-3">{h.risk}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}
                </div>
            );
        }

        function Analytics({ metrics }) {
            const chartRef = useRef(null);
            
            useEffect(() => {
                if (!metrics || !chartRef.current) return;
                const ctx = chartRef.current.getContext('2d');
                
                const labels = Object.keys(metrics);
                const accuracies = labels.map(l => (metrics[l].accuracy * 100).toFixed(1));
                const f1s = labels.map(l => (metrics[l].f1_score * 100).toFixed(1));

                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels.map(l => l.toUpperCase()),
                        datasets: [
                            { label: 'Accuracy (%)', data: accuracies, backgroundColor: 'rgba(56, 189, 248, 0.7)' },
                            { label: 'F1 Score (%)', data: f1s, backgroundColor: 'rgba(168, 85, 247, 0.7)' }
                        ]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { labels: { color: 'white' } } },
                        scales: {
                            y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: 'white' } },
                            x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: 'white' } }
                        }
                    }
                });
            }, [metrics]);

            if (!metrics) return <div className="text-center py-20">Loading metrics... Ensure backend is running.</div>;

            return (
                <div className="space-y-8 animate-fade-in">
                    <h2 className="text-2xl font-bold">Model Analytics</h2>
                    <div className="glass p-6 rounded-2xl w-full max-w-4xl mx-auto">
                        <canvas ref={chartRef}></canvas>
                    </div>
                    <div className="grid md:grid-cols-3 gap-6">
                        {Object.entries(metrics).map(([disease, data]) => (
                            <div key={disease} className="glass p-6 rounded-2xl">
                                <h3 className="text-xl font-bold mb-4 capitalize text-blue-400">{disease}</h3>
                                <div className="space-y-2 text-sm text-gray-300">
                                    <div className="flex justify-between"><span>Algorithm:</span> <span>{data.algorithm}</span></div>
                                    <div className="flex justify-between"><span>Accuracy:</span> <span>{(data.accuracy*100).toFixed(2)}%</span></div>
                                    <div className="flex justify-between"><span>F1 Score:</span> <span>{(data.f1_score*100).toFixed(2)}%</span></div>
                                    <div className="flex justify-between"><span>ROC AUC:</span> <span>{(data.roc_auc*100).toFixed(2)}%</span></div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
